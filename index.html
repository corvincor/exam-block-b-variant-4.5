<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Аналітична Хімія</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Dependencies via Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
      }
    </script>
    <!-- TensorFlow.js (Classic script) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
</head>
<body>
    <!-- AR Container -->
    <div id="ar-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <!-- Loading Screen -->
        <div id="loading-screen" class="glass-panel active">
            <div class="spinner"></div>
            <h2>Ініціалізація AR...</h2>
            <p>Завантаження моделей та нейромережі</p>
        </div>

        <!-- Main Dashboard (Header) -->
        <header id="top-bar" class="glass-panel hidden">
            <div class="logo">
                <span class="neon-text">Chem</span>AR
            </div>
            <div class="status-indicator">
                <div id="status-dot" class="dot red"></div>
                <span id="status-text">Шукаю маркер спектру...</span>
            </div>
        </header>

        <!-- ML Analysis Results Panel -->
        <div id="ml-panel" class="glass-panel hidden">
            <h3>Аналіз Речовини</h3>
            <div class="ml-result">
                <div class="result-row">
                    <span>Речовина:</span>
                    <strong id="substance-name" class="highlight">Невідомо</strong>
                </div>
                <div class="result-row">
                    <span>Ймовірність:</span>
                    <div class="progress-bar-container">
                        <div id="probability-bar" class="progress-bar" style="width: 0%;"></div>
                    </div>
                    <span id="probability-text">0%</span>
                </div>
                <div class="result-row">
                    <span>Формула:</span>
                    <span id="chemical-formula">-</span>
                </div>
            </div>
            <button id="scan-btn" class="primary-btn">Сканувати ще раз</button>
        </div>
        
        <!-- Info Panel for instructions -->
        <div id="info-panel" class="glass-panel hidden">
            <p>Наведіть камеру на маркер хроматограми, щоб розпізнати речовину та побачити її молекулярну структуру.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="molecule-builder.js"></script>
    <script type="module" src="ml-analyzer.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
